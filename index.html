//  TABLE SECTIONS
// ═══════════════════════════════════════════════════════
function showAddSectionModal() {
  showModal(`
    <h3>${t('addSection')}</h3>
    <div class="form-grp"><label>${t('name')}</label><input id="ns-n" type="text" placeholder="e.g. First Floor" autofocus></div>
    <div class="form-grp"><label>${t('numberOfTables')}</label><input id="ns-c" type="number" min="0" max="60" value="4" style="max-width:100px;"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary" onclick="addSection()">${t('add')}</button>
    </div>`);
}

function addSection() {
  const name = document.getElementById('ns-n').value.trim();
  if (!name) { notify(t('name') + '?'); return; }
  const count = Math.max(0, Math.min(60, parseInt(document.getElementById('ns-c').value) || 0));
  const id = uid();
  D.sections.push({ id, name });
  let n = nextTableNumber();
  for (let i = 0; i < count; i++) {
    D.tables.push({ id: uid(), name: 'Table ' + (n++), status: 'available', orderId: null, sectionId: id });
  }
  save(); closeModal(); renderMain(); notify(`${name} added`);
}

function editSectionModal(sectionId) {
  const sec = D.sections.find(s => s.id === sectionId);
  if (!sec) return;
  const count = D.tables.filter(t => t.sectionId === sectionId).length;
  showModal(`
    <h3>${t('editSection')}</h3>
    <div class="form-grp"><label>${t('name')}</label><input id="es-n" type="text" value="${h(sec.name)}" autofocus></div>
    <div class="form-grp"><label>${t('numberOfTables')}</label><input id="es-c" type="number" min="0" max="60" value="${count}" style="max-width:100px;"></div>
    <p style="font-size:11.5px;color:var(--muted);margin-bottom:10px;">${t('sectionTableHint')}</p>
    <div class="modal-foot">
      ${D.sections.length > 1 ? `<button class="btn btn-ghost" style="color:var(--danger);margin-right:auto;" onclick="deleteSection('${sectionId}')">${t('deleteSection')}</button>` : ''}
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary" onclick="applyEditSection('${sectionId}')">${t('save')}</button>
    </div>`);
}

function applyEditSection(sectionId) {
  const sec = D.sections.find(s => s.id === sectionId);
  if (!sec) return;
  const name = document.getElementById('es-n').value.trim();
  if (!name) { notify(t('name') + '?'); return; }
  const newCount = Math.max(0, Math.min(60, parseInt(document.getElementById('es-c').value) || 0));
  const tables = D.tables.filter(t => t.sectionId === sectionId);
  if (newCount < tables.length) {
    const toRemove = tables.slice(newCount);
    if (toRemove.some(tb => tb.status === 'occupied' || tb.orderId)) { notify(t('closeOrdersFirst')); return; }
    const removeIds = new Set(toRemove.map(tb => tb.id));
    D.tables = D.tables.filter(tb => !removeIds.has(tb.id));
  } else if (newCount > tables.length) {
    let n = nextTableNumber();
    for (let i = tables.length; i < newCount; i++) {
      D.tables.push({ id: uid(), name: 'Table ' + (n++), status: 'available', orderId: null, sectionId });
    }
  }
  sec.name = name;
  save(); closeModal(); renderMain(); notify(t('save'));
}

function deleteSection(sectionId) {
  const sec = D.sections.find(s => s.id === sectionId);
  if (!sec) return;
  if (D.sections.length <= 1) { notify(t('lastSectionHint')); return; }
  const tables = D.tables.filter(t => t.sectionId === sectionId);
  if (tables.some(tb => tb.status === 'occupied' || tb.orderId)) { notify(t('closeOrdersFirst')); return; }
  closeModal();
  askPin(() => {
    if (!confirm(t('deleteSectionConfirm').replace('%s', sec.name))) return;
    const removeIds = new Set(tables.map(tb => tb.id));
    D.tables = D.tables.filter(tb => !removeIds.has(tb.id));
    D.sections = D.sections.filter(s => s.id !== sectionId);
    save(); renderMain(); notify(t('deleted'));
  });
}

// ═══════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════
function showModal(html) {
  closeModal();
  const bg = document.createElement('div');
  bg.className = 'modal-bg'; bg.id = 'modal-bg';
  bg.onclick = e => { if (e.target === bg) closeModal(); };
  const m = document.createElement('div');
  m.className = 'modal'; m.innerHTML = html;
  bg.appendChild(m); document.body.appendChild(bg);
  setTimeout(() => m.querySelector('input,button')?.focus(), 50);
}

function closeModal() {
  document.getElementById('modal-bg')?.remove();
}

// ═══════════════════════════════════════════════════════
//  NOTIFICATION
// ═══════════════════════════════════════════════════════
function notify(msg, ms=2600) {
  document.querySelector('.notif')?.remove();
  const el = document.createElement('div');
  el.className = 'notif'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), ms);
}

// ═══════════════════════════════════════════════════════
//  EVENT BINDING
// ═══════════════════════════════════════════════════════
function bindEvents() {
  // Category sidebar + mobile pill strip (shared scroll logic)
  function bindCatBtns(selector, activeSelector) {
    document.querySelectorAll(selector).forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll(activeSelector).forEach(b => b.classList.toggle('active', b === btn));
        const targetId = btn.dataset.target;
        const scroller = document.getElementById('items-scroll');
        if (targetId === 'cat-sec-all') { if (scroller) scroller.scrollTo({ top: 0, behavior: 'smooth' }); return; }
        const target = document.getElementById(targetId);
        if (target) {
          if (target.classList.contains('collapsed')) toggleCatSection(targetId);
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });
  }
  bindCatBtns('.cat-side-btn', '.cat-side-btn');
  bindCatBtns('.mobile-cat-pill', '.mobile-cat-pill');

  // Menu search
  const mq = document.getElementById('menu-q');
  if (mq) {
    mq.addEventListener('input', () => {
      S.menuQ = mq.value;
      const o = curOrder();
      if (!o) return;
      const el = document.getElementById('menu-area');
      if (el) {
        const tmp = document.createElement('div'); tmp.innerHTML = menuPaneHTML(o); el.replaceWith(tmp.firstElementChild);
        const newMq = document.getElementById('menu-q');
        if (newMq) { newMq.focus(); newMq.setSelectionRange(newMq.value.length, newMq.value.length); }
        bindEvents();
      }
    });
  }

  document.onkeydown = e => {
    if (e.key !== 'Escape') return;
    if (document.getElementById('modal-bg')) { closeModal(); return; }
    if (S.view === 'order') { go('tables'); return; }
    if (S.view === 'vendorBills') { S.accountsTab = 'vendors'; go('accounts'); return; }
  };
}

    { v:'tables',   ico:'&#129681;', key:'tables'   },

// ═══════════════════════════════════════════════════════
//  AUTHENTICATION & SESSION
// ═══════════════════════════════════════════════════════
function currentUser() { return S.currentUser ? D.users.find(u => u.id === S.currentUser) : null; }
function isOwner() { const u = currentUser(); return u && u.role === 'Owner'; }
function canManage() { const u = currentUser(); return !!u && (u.role === 'Owner' || u.role === 'Manager'); }

function showLogin() {
  S.currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-sub').textContent = D.settings.name;
  document.getElementById('lbl-uid').textContent = t('username');
  document.getElementById('lbl-pwd').textContent = t('password');
  document.getElementById('login-btn').textContent = t('signIn');
  document.getElementById('login-err').textContent = '';
  const u = document.getElementById('login-user'), p = document.getElementById('login-pass');
  u.value = ''; p.value = '';
  u.onkeydown = p.onkeydown = e => { if (e.key === 'Enter') doLogin(); };
  setTimeout(() => u.focus(), 50);
}

function doLogin() {
  const uname = document.getElementById('login-user').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const user  = D.users.find(u => u.username.toLowerCase() === uname.toLowerCase() && u.password === pass);
  if (!user) { document.getElementById('login-err').textContent = t('wrongCreds'); return; }
  S.currentUser = user.id;
  localStorage.setItem('rb2_session', user.id);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = '';
  startApp();
  notify(t('loggedInAs') + ' ' + user.username);
}

function logout() {
  if (!confirm(t('logout') + '?')) return;
  localStorage.removeItem('rb2_session');
  S.currentUser = null;
  S.view = 'tables';
  showLogin();
}

function renderHeaderUser() {
  const u = currentUser();
  const el = document.getElementById('hdr-user');
  const lo = document.getElementById('logout-btn');
  if (u) {
    el.innerHTML = `${h(u.username)} <span class="role-tag">${h(u.role)}</span>`;
    lo.style.display = '';
  } else {
    el.innerHTML = '';
    lo.style.display = 'none';
  }
}

function startApp() {
  buildNav();
  renderMain();
  renderHeaderUser();
}

// ═══════════════════════════════════════════════════════
//  USER MANAGEMENT (Owner only)
// ═══════════════════════════════════════════════════════
function showUserModal(userId) {
  const u = userId ? D.users.find(x => x.id === userId) : null;
  const roleOpts = ROLES.map(r => `<option value="${r}"${u && u.role === r ? ' selected' : ''}>${r}</option>`).join('');
  showModal(`
    <h3>${u ? t('editUser') : t('addUser')}</h3>
    <div class="form-grp"><label>${t('username')}</label><input id="u-name" type="text" value="${u ? h(u.username) : ''}" autofocus></div>
    <div class="form-grp"><label>${t('password')}</label><input id="u-pass" type="text" value="${u ? h(u.password) : ''}"></div>
    <div class="form-grp"><label>${t('role')}</label><select id="u-role">${roleOpts}</select></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary" onclick="saveUser('${userId || ''}')">${t('save')}</button>
    </div>`);
}

function saveUser(userId) {
  const name = document.getElementById('u-name').value.trim();
  const pass = document.getElementById('u-pass').value.trim();
  const role = document.getElementById('u-role').value;
  if (!name) { notify(t('username') + '?'); return; }
  if (!pass) { notify(t('password') + '?'); return; }
  const dup = D.users.find(x => x.username.toLowerCase() === name.toLowerCase() && x.id !== userId);
  if (dup) { notify(t('userExists')); return; }
  if (userId) {
    const u = D.users.find(x => x.id === userId);
    if (u) { u.username = name; u.password = pass; u.role = role; }
  } else {
    D.users.push({ id: uid(), username: name, password: pass, role });
  }
  save(); closeModal(); renderMain(); renderHeaderUser(); notify(t('save'));
}

function deleteUser(userId) {
  const u = D.users.find(x => x.id === userId);
  if (!u) return;
  if (u.role === 'Owner' && D.users.filter(x => x.role === 'Owner').length <= 1) { notify(t('lastOwner')); return; }
  if (u.id === S.currentUser) { notify(t('cantDeleteSelf')); return; }
  if (!confirm(t('deleteUser') + ' "' + u.username + '"?')) return;
  D.users = D.users.filter(x => x.id !== userId);
  save(); renderMain(); notify(t('deleted'));
}

function init() {
  load();
  applyTheme();
  const sess = localStorage.getItem('rb2_session');
  const valid = sess && D.users.find(u => u.id === sess);
  if (valid) {
    S.currentUser = sess;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = '';
    startApp();
  } else {
    showLogin();
  }
}

init();
