function clickMenuItem(orderId, itemId) {
  const m = D.menu.find(x => x.id === itemId);
  if (!m) return;
  if (m.stock != null && m.stock <= 0) { notify(t('outOfStock')); return; }
  const hasOpts = (m.variants && m.variants.length) || (m.addons && m.addons.length);
  if (hasOpts) showCustomizeModal(orderId, itemId);
  else addLine(orderId, itemId, null, [], '', 1);
}

function lineSig(itemId, variantName, addons, note) {
  return itemId + '|' + (variantName||'') + '|' + (addons||[]).map(a=>a.name).sort().join(',') + '|' + (note||'');
}

function addLine(orderId, itemId, variant, addons, note, qty) {
  const o = D.orders.find(x => x.id === orderId);
  const m = D.menu.find(x => x.id === itemId);
  if (!o || !m) return;
  addons = addons || [];
  const unit = m.price + (variant ? variant.delta : 0) + addons.reduce((s,a)=>s+a.price,0);
  const sig = lineSig(itemId, variant ? variant.name : '', addons, note);
  const ex = o.items.find(i => i.sig === sig);
  if (ex) ex.qty += qty;
  else o.items.push({
    lineId: uid(), id: itemId, sig, name: m.name,
    variant: variant ? variant.name : null,
    addons: addons.map(a => ({...a})),
    note: note || '', unitPrice: unit, qty,
  });
  save();
  refreshOrderPane(o);
}

function chQty(orderId, lineKey, delta) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  const item = o.items.find(i => (i.lineId || i.id) === lineKey);
  if (!item) return;
  if (delta < 0 && o.kotStatus === 'active') {
    const lockedQty = item.acceptedQty || 0;
    if (item.qty + delta < lockedQty) {
      notify(t('kitchenConfirmedNote'));
      return;
    }
    const removedQty = Math.min(-delta, item.qty);
    if (removedQty > 0) {
      if (!Array.isArray(o.kotCancellations)) o.kotCancellations = [];
      o.kotCancellations.push({
        id: uid(), name: item.name, variant: item.variant || null,
        addons: (item.addons || []).map(a => a.name), qty: removedQty,
        at: new Date().toISOString(), accepted: false,
      });
      o.kotPrepStatus = 'pending';
    }
  }
  const wasFullyAccepted = o.kotStatus === 'active' && item.qty <= (item.acceptedQty || 0);
  item.qty += delta;
  if (item.qty <= 0) o.items = o.items.filter(i => (i.lineId || i.id) !== lineKey);
  save();
  refreshOrderPane(o);
  if (delta < 0 && o.kotStatus === 'active' && kotPrintEnabled()) {
    const c = o.kotCancellations[o.kotCancellations.length - 1];
    const extra = c.variant ? ` (${c.variant})` : '';
    printKOT(o, `${t('itemCancelled')}: ${c.qty}× ${c.name}${extra}`.toUpperCase());
  } else if (delta > 0 && wasFullyAccepted && o.kotStatus === 'active') {
    if (o.kotPrepStatus === 'done') o.kotPrepStatus = 'pending';
    save();
    if (kotPrintEnabled()) {
      const extra = item.variant ? ` (${item.variant})` : '';
      printKOT(o, `${t('updatedKot')}: +${delta}× ${item.name}${extra}`.toUpperCase());
    }
  }
}

function showCustomizeModal(orderId, itemId) {
  const m = D.menu.find(x => x.id === itemId);
  if (!m) return;
  S.custom = { orderId, itemId, variantIdx: (m.variants && m.variants.length) ? 0 : -1, addons: [], qty: 1 };
  renderCustomizeModal();
}

function renderCustomizeModal() {
  const c = S.custom; if (!c) return;
  const m = D.menu.find(x => x.id === c.itemId);
  const variantsHTML = (m.variants && m.variants.length) ? `
    <div class="opt-group">
      <div class="opt-lbl">${t('size')}</div>
      ${m.variants.map((v,idx) => `
        <label class="opt-row${c.variantIdx===idx?' sel':''}">
          <input type="radio" name="cv" ${c.variantIdx===idx?'checked':''} onclick="custVariant(${idx})">
          <span>${h(v.name)}</span>
          <span class="opt-pr">${fmt(m.price + v.delta)}</span>
        </label>`).join('')}
    </div>` : '';
  const addonsHTML = (m.addons && m.addons.length) ? `
    <div class="opt-group">
      <div class="opt-lbl">${t('addOns')}</div>
      ${m.addons.map((a,idx) => `
        <label class="opt-row${c.addons.includes(idx)?' sel':''}">
          <input type="checkbox" ${c.addons.includes(idx)?'checked':''} onclick="custAddon(${idx})">
          <span>${h(a.name)}</span>
          <span class="opt-pr">+${fmt(a.price)}</span>
        </label>`).join('')}
    </div>` : '';
  const variant = c.variantIdx >= 0 ? m.variants[c.variantIdx] : null;
  const unit = m.price + (variant?variant.delta:0) + c.addons.reduce((s,i)=>s+m.addons[i].price,0);
  showModal(`
    <h3>${h(m.name)}</h3>
    ${variantsHTML}${addonsHTML}
    <div class="opt-group">
      <div class="opt-lbl">${t('specialNote')}</div>
      <textarea id="cust-note" rows="2" placeholder="e.g. no onion, less spicy" style="width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;">${h(c.note||'')}</textarea>
    </div>
    <div class="opt-group" style="display:flex;align-items:center;gap:12px;">
      <div class="opt-lbl" style="margin:0;">${t('quantity')}</div>
      <div class="qty-ctrl">
        <button class="qbtn" onclick="custQty(-1)">&#8722;</button>
        <span class="qnum">${c.qty}</span>
        <button class="qbtn" onclick="custQty(1)">+</button>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary btn-lg" onclick="confirmCustom()">${t('add')} &middot; ${fmt(unit*c.qty)}</button>
    </div>`);
}

function custVariant(idx) { saveCustNote(); S.custom.variantIdx = idx; renderCustomizeModal(); }
function custAddon(idx) {
  saveCustNote();
  const a = S.custom.addons;
  const p = a.indexOf(idx);
  if (p >= 0) a.splice(p,1); else a.push(idx);
  renderCustomizeModal();
}
function custQty(d) { saveCustNote(); S.custom.qty = Math.max(1, S.custom.qty + d); renderCustomizeModal(); }
function saveCustNote() { const el = document.getElementById('cust-note'); if (el) S.custom.note = el.value; }
function confirmCustom() {
  saveCustNote();
  const c = S.custom; const m = D.menu.find(x => x.id === c.itemId);
  const variant = c.variantIdx >= 0 ? m.variants[c.variantIdx] : null;
  const addons = c.addons.map(i => m.addons[i]);
  addLine(c.orderId, c.itemId, variant, addons, (c.note||'').trim(), c.qty);
  S.custom = null; closeModal();
}

function clearOrder(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  // KOT already confirmed -> deleting it needs PIN + comment
  if (o.kotStatus === 'active') { deleteKOT(orderId); return; }
  // not yet confirmed -> clear the draft immediately
  o.items = []; o.discount = 0;
  save();
  refreshOrderPane(o);
  notify(t('clear'));
}

function setDiscount(orderId, val) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  o.discount = parseFloat(val) || 0;
  save();
  refreshBillBox(o);
}

function setDiscType(orderId, type) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  o.discType = type;
  save();
  refreshBillBox(o);
}

function refreshOrderPane(o) {
  const el = document.getElementById('order-pane');
  if (!el) return;
  const wasOpen = el.classList.contains('mobile-open');
  const tmp = document.createElement('div');
  tmp.innerHTML = orderPaneHTML(o);
  el.replaceWith(tmp.firstElementChild);
  if (wasOpen) document.getElementById('order-pane')?.classList.add('mobile-open');
  updateMobileFab(o);
}

function openMobileOrder() {
  document.getElementById('order-pane')?.classList.add('mobile-open');
  document.getElementById('mobile-backdrop')?.classList.add('active');
  S.mobileOrderOpen = true;
}

function closeMobileOrder() {
  document.getElementById('order-pane')?.classList.remove('mobile-open');
  document.getElementById('mobile-backdrop')?.classList.remove('active');
  S.mobileOrderOpen = false;
}

function updateMobileFab(o) {
  const fab = document.getElementById('mobile-cart-fab');
  if (!fab) return;
  if (!o) o = curOrder();
  if (!o) return;
  const count = o.items.reduce((s, i) => s + i.qty, 0);
  if (count > 0) {
    const b = calcBill(o);
    fab.innerHTML = `&#128722; ${count} item${count > 1 ? 's' : ''} &nbsp;&middot;&nbsp; ${fmt(b.total)} &nbsp;&#8250;`;
    fab.style.display = 'flex';
  } else {
    fab.style.display = 'none';
  }
}

function refreshBillBox(o) {
  const el = document.querySelector('.bill-box');
  if (!el) return;
  const b = calcBill(o);
  el.querySelector('.disc-amt').textContent = '\u2212' + fmt(b.disc);
  el.querySelectorAll('.bill-row:not(.total):not(.credit-row) span:last-child')[0].textContent = fmt(b.sub);
  el.querySelectorAll('.bill-row:not(.total):not(.credit-row) span:last-child')[1].textContent = fmt(b.tax);
  let creditRow = el.querySelector('.credit-row');
  if (b.credit > 0) {
    if (!creditRow) {
      creditRow = document.createElement('div');
      creditRow.className = 'bill-row credit-row';
      creditRow.innerHTML = `<span class="lbl">${t('creditApplied')}</span><span style="color:var(--success);">\u2212${fmt(b.credit)}</span>`;
      el.querySelector('.bill-row.total').before(creditRow);
    } else {
      creditRow.querySelector('span:last-child').textContent = '\u2212' + fmt(b.credit);
    }
  } else if (creditRow) {
    creditRow.remove();
  }
  el.querySelector('.bill-row.total span:last-child').textContent = fmt(b.total);
  // Update table card amount
  const tbl = D.tables.find(t => t.id === o.tableId);
  if (tbl) {
    const card = document.querySelector(`.tbl-card`);
    // only relevant when on tables view, skip
  }
}

        <button class="btn btn-success" id="split-confirm" disabled onclick="confirmSplitPay('${o.id}')">&#10003; ${t('confirmPayment')}</button>
      </div>
    </div>`;
}

function updSplit(orderId, el) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  const total = Math.round(calcBill(o).total * 100) / 100;
  let v = parseFloat(el.value);
  if (isNaN(v) || v < 0) v = 0;
  let others = 0;
  document.querySelectorAll('.sp-amt').forEach(i => { if (i !== el) others += parseFloat(i.value) || 0; });
  others = Math.round(others * 100) / 100;
  // cap this entry so the sum never exceeds the bill total
  const maxAllowed = Math.max(0, Math.round((total - others) * 100) / 100);
  if (v > maxAllowed) { v = maxAllowed; el.value = v || ''; }
  el.classList.toggle('filled', v > 0);
  const rem = Math.round((total - others - v) * 100) / 100;
  const remEl = document.getElementById('split-rem');
  if (remEl) {
    remEl.textContent = (rem === 0 ? '✓ ' + t('splitPaid') + ' ' : '') + fmt(rem === 0 ? total : rem);
    remEl.style.color = rem === 0 ? 'var(--success)' : 'var(--warning)';
  }
  const cf = document.getElementById('split-confirm');
  if (cf) cf.disabled = rem !== 0;
}

function confirmSplitPay(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o || !o.items.length) return;
  const total = Math.round(calcBill(o).total * 100) / 100;
  const pays = [];
  let sum = 0;
  document.querySelectorAll('.sp-amt').forEach(i => {
    const v = Math.round((parseFloat(i.value) || 0) * 100) / 100;
    if (v > 0) { pays.push({ method: i.dataset.m, amount: v }); sum += v; }
  });
  sum = Math.round(sum * 100) / 100;
  if (!pays.length || sum !== total) return;
  o.splitPayments = pays;
  o.dueAmount = 0;
  S.payMethod = pays.length === 1 ? pays[0].method : 'Split';
  S.splitMode = false;
  confirmPay(orderId);
}

function payLaterHTML(o) {
  const total = Math.round(calcBill(o).total * 100) / 100;
  return `
    <div class="split-wrap">
      <div class="split-head">
        <span>&#128337; ${t('payLater')}</span>
        <span class="split-rem-lbl">${t('dueAmount')}: <b id="pl-due">${fmt(total)}</b></span>

            </div>

        <button class="btn btn-success" id="pl-confirm" onclick="confirmPayLaterPay('${o.id}')">&#10003; ${t('confirmPayLater')}</button>

}

function updPayLater(orderId, el) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  const total = Math.round(calcBill(o).total * 100) / 100;
  let v = parseFloat(el.value);
  if (isNaN(v) || v < 0) v = 0;
  let others = 0;
  document.querySelectorAll('.pl-amt').forEach(i => { if (i !== el) others += parseFloat(i.value) || 0; });
  others = Math.round(others * 100) / 100;
  // cap this entry so the sum never exceeds the bill total
  const maxAllowed = Math.max(0, Math.round((total - others) * 100) / 100);
  if (v > maxAllowed) { v = maxAllowed; el.value = v || ''; }
  el.classList.toggle('filled', v > 0);
  const due = Math.round((total - others - v) * 100) / 100;
  const dueEl = document.getElementById('pl-due');
  if (dueEl) dueEl.textContent = fmt(due);
}

function confirmPayLaterPay(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o || !o.items.length) return;
  const total = Math.round(calcBill(o).total * 100) / 100;
  const pays = [];
  let sum = 0;
  document.querySelectorAll('.pl-amt').forEach(i => {
    const v = Math.round((parseFloat(i.value) || 0) * 100) / 100;
    if (v > 0) { pays.push({ method: i.dataset.m, amount: v }); sum += v; }
  });
  sum = Math.round(sum * 100) / 100;
  const due = Math.max(0, Math.round((total - sum) * 100) / 100);
  o.splitPayments = pays.length ? pays : null;
  o.dueAmount = due;

function quickPay(orderId, method) {

  if (method === 'Cash') { showCashModal(orderId); return; }
  o.dueAmount = 0;
  S.payMethod = method;
  confirmPay(orderId);
}

// ── Cash tender dialog: prefilled with bill amount, computes change ──

    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>

    </div>`);
  setTimeout(() => { const i = document.getElementById('cash-rcv'); if (i) { i.focus(); i.select(); } }, 60);

function updCashChange(orderId, el) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  const total = Math.round(calcBill(o).total * 100) / 100;
  const rcv = parseFloat(el.value) || 0;
  const valEl = document.getElementById('cash-change-val');
  const ok = document.getElementById('cash-ok');
  const creditToggleWrap = document.getElementById('cash-credit-toggle-wrap');
  const creditSection = document.getElementById('cash-credit-section');
  if (rcv < total) {
    if (valEl) { valEl.textContent = t('insufficientCash'); valEl.style.color = 'var(--danger)'; }
    if (ok) ok.disabled = true;
    if (creditToggleWrap) creditToggleWrap.style.display = 'none';
    if (creditSection) creditSection.style.display = 'none';
  } else {
    const change = Math.round((rcv - total) * 100) / 100;
    if (valEl) { valEl.textContent = fmt(change); valEl.style.color = 'var(--success)'; }
    if (ok) ok.disabled = false;
    if (creditToggleWrap) creditToggleWrap.style.display = change > 0 ? 'block' : 'none';
    if (change <= 0 && creditSection) creditSection.style.display = 'none';
    const ccAmt = document.getElementById('cc-amt');
    if (ccAmt) ccAmt.textContent = fmt(change);
  }
}

function toggleCashCredit(orderId) {
  const sec = document.getElementById('cash-credit-section');
  if (!sec) return;
  sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
}

function confirmCashCredit(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  const total = Math.round(calcBill(o).total * 100) / 100;
  const rcv = parseFloat(document.getElementById('cash-rcv').value) || 0;
  const change = Math.round((rcv - total) * 100) / 100;
  if (change <= 0) return;
  const name = (document.getElementById('cc-name').value || '').trim();
  const phone = normPhone(document.getElementById('cc-phone').value || '');
  if (!name || !phone) { notify(t('enterCustDetails')); return; }
  o.customer = { name, phone };
  o.cashReceived = rcv;
  o.changeGiven = 0;
  o.dueAmount = -change;
  S.payMethod = 'Cash';
  confirmPay(orderId);
}

function confirmCashPay(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  const total = Math.round(calcBill(o).total * 100) / 100;
  const rcv = parseFloat(document.getElementById('cash-rcv').value) || 0;
  if (rcv < total) return;
  o.cashReceived = rcv;
  o.changeGiven = Math.round((rcv - total) * 100) / 100;
  o.dueAmount = 0;
  S.payMethod = 'Cash';
  confirmPay(orderId);
}

function confirmPay(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  o.status = 'paid';
  o.paymentMethod = S.payMethod;
  const keepSplits = S.payMethod === 'Split' || S.payMethod === 'Pay Later' ||
    (o.splitPayments && o.splitPayments.length === 1 && o.splitPayments[0].method === S.payMethod);
  if (!keepSplits) o.splitPayments = null;
  if (o.dueAmount == null) o.dueAmount = 0;
  o.paidAmount = calcBill(o).total - (o.dueAmount || 0);
  o.closedAt = new Date().toISOString();
  ensureSerial(o);
  if (o.kotStatus !== 'active') {
    o.kotStatus = 'active';
    o.kotSavedAt = o.kotSavedAt || new Date().toISOString();
  }
  if (!o.kotPrepStatus) o.kotPrepStatus = 'pending';
  // deduct stock
  o.items.forEach(it => {
    const m = D.menu.find(x => x.id === it.id);
    if (m && m.stock != null && m.reduceInventory !== false) m.stock = Math.max(0, m.stock - it.qty);
  });
  syncCustomerFromOrder(o);
  // free table if dine-in
  if (o.tableId) {
    const tbl = D.tables.find(x => x.id === o.tableId);
    if (tbl) {
      tbl.status = 'available'; tbl.orderId = null;
      // auto-delete a split table once its payment is done; restore parent when the group is empty
      if (tbl.splitGroup) {
        const group = tbl.splitGroup, parentName = tbl.splitParent, idx = D.tables.indexOf(tbl), sectionId = tbl.sectionId;
        D.tables = D.tables.filter(x => x.id !== tbl.id);
        if (!D.tables.some(x => x.splitGroup === group)) {
          D.tables.splice(Math.min(idx, D.tables.length), 0, { id: uid(), name: parentName, status: 'available', orderId: null, sectionId });
        }
      }
    }
  }
  save();
  closeModal();
  notify('Payment confirmed!');
  go('tables');
}

// ═══════════════════════════════════════════════════════
//  KOT (Kitchen Order Ticket)
// ═══════════════════════════════════════════════════════
function needsKOT(o) {
  if (!D.kitchens || D.kitchens.length === 0) return true;
  return o.items.some(it => {
    const m = D.menu.find(x => x.id === it.id);
    if (!m || !m.kitchenId) return false;
    const k = D.kitchens.find(k => k.id === m.kitchenId);
    return k && k.kotRequired;
  });
}

function saveKOT(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o || !o.items.length) { notify(t('addItems')); return; }
  ensureSerial(o);
  o.kotStatus = 'active';
  o.kotSavedAt = new Date().toISOString();
  if (needsKOT(o)) {
    o.kotPrepStatus = 'pending';
    save();
    notify('KOT ' + kotId(o));
    if (kotPrintEnabled()) printKOT(o);
  } else {
    o.kotPrepStatus = 'done';
    save();
    notify(t('saveKot') + ' ✓');
  }
  renderMain();
}

function kotPrintEnabled() {
  return (D.kitchens||[]).some(k => k.printerEnabled && k.kotRequired);
}

function printerWidthPx(size) {
  return size === '58mm' ? '200px' : '280px';
}

function printKOTById(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o || !o.items.length) { notify(t('addItems')); return; }
  if (!needsKOT(o)) { notify(t('kotRequired') + ': ' + t('off')); return; }
  if (!kotPrintEnabled()) { notify(t('printer') + ': ' + t('off')); return; }
  ensureSerial(o);
  o.kotStatus = 'active';
  o.kotSavedAt = new Date().toISOString();
  o.kotPrepStatus = 'pending';
  save();
  printKOT(o);
  renderMain();
}

function balClass(bal) {

  if (bal < 0) return 'bal-credit';
  return 'bal-zero';
}
function balLabel(bal) {
  if (bal > 0) return t('customerDue');
  if (bal < 0) return t('restaurantDue');

        <div class="sp-cell">
          <input type="number" class="cd-amt sp-amt" data-m="${p.id}" min="0" step="any" placeholder="0" inputmode="decimal" oninput="updClearDue('${custId}', this)">
          <div class="qp-btn${p.iconOnly ? ' qp-cash' : ''}" title="${p.label}">
            <span class="qp-ico">${p.ico}</span>

      <span>${t('remainingDue')}</span><span id="cd-rem" style="color:var(--warning);">${fmt(absBal)}</span>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-success btn-lg" id="cd-confirm" onclick="confirmClearDue('${custId}')">&#10003; ${t('confirmClearDue')}</button>
    </div>`);
}

function updClearDue(custId, el) {
  const c = D.customers.find(x => x.id === custId);
  if (!c) return;
  const absBal = Math.abs(Math.round((Number(c.balance) || 0) * 100) / 100);
  let v = parseFloat(el.value);
  if (isNaN(v) || v < 0) v = 0;
  let others = 0;
  document.querySelectorAll('.cd-amt').forEach(i => { if (i !== el) others += parseFloat(i.value) || 0; });
  others = Math.round(others * 100) / 100;
  // cap this entry so the sum never exceeds the outstanding balance
  const maxAllowed = Math.max(0, Math.round((absBal - others) * 100) / 100);
  if (v > maxAllowed) { v = maxAllowed; el.value = v || ''; }
  el.classList.toggle('filled', v > 0);
  const rem = Math.round((absBal - others - v) * 100) / 100;
  const remEl = document.getElementById('cd-rem');
  if (remEl) {
    remEl.textContent = fmt(rem);
    remEl.style.color = rem === 0 ? 'var(--success)' : 'var(--warning)';
  }
}

function confirmClearDue(custId) {
  const c = D.customers.find(x => x.id === custId);
  if (!c) return;
  const bal = Math.round((Number(c.balance) || 0) * 100) / 100;
  if (bal === 0) return;
  const absBal = Math.abs(bal);
  const pays = [];
  let sum = 0;
  document.querySelectorAll('.cd-amt').forEach(i => {
    const v = Math.round((parseFloat(i.value) || 0) * 100) / 100;
    if (v > 0) { pays.push({ method: i.dataset.m, amount: v }); sum += v; }
  });
  sum = Math.round(sum * 100) / 100;
  if (sum <= 0) { notify(t('clearDueAmountReq')); return; }
  if (sum > absBal) sum = absBal;
  const isCustomerDue = bal > 0;
  c.balance = Math.round((isCustomerDue ? bal - sum : bal + sum) * 100) / 100;
  if (!Array.isArray(c.history)) c.history = [];
  c.history.push({
    date: new Date().toISOString(),
    orderId: null,
    billId: t('clearDue'),
    items: [],
    amount: 0,
    dueAmount: isCustomerDue ? -sum : sum,
  });
  if (isCustomerDue) {
    if (!Array.isArray(D.dueSettlements)) D.dueSettlements = [];
    pays.forEach(p => D.dueSettlements.push({ id: uid(), customerId: c.id, customerName: c.name, date: new Date().toISOString(), amount: p.amount, method: p.method }));
  }
  save();
  closeModal();
  notify(t('clearDue') + ': ' + fmt(sum));
  rerenderCrm();
}

}

function variantRowHTML(v, i) {
  return `<div class="editor-row">
    <input type="text" placeholder="${t('size')}" value="${h(v.name||'')}" oninput="S.editBuf.variants[${i}].name=this.value">

    <button class="rm" type="button" onclick="rmVariantRow(${i})">&times;</button>
  </div>`;
}
function addonRowHTML(a, i) {
  return `<div class="editor-row">
    <input type="text" placeholder="${t('name')}" value="${h(a.name||'')}" oninput="S.editBuf.addons[${i}].name=this.value">
    <input type="number" step="0.5" min="0" style="max-width:80px;flex:0 0 80px;" placeholder="${t('price')}" value="${a.price!=null?a.price:''}" oninput="S.editBuf.addons[${i}].price=parseFloat(this.value)||0">
    <button class="rm" type="button" onclick="rmAddonRow(${i})">&times;</button>
  </div>`;
}
function addVariantRow() { S.editBuf.variants.push({name:'',delta:0}); document.getElementById('var-list').innerHTML = S.editBuf.variants.map((v,i)=>variantRowHTML(v,i)).join(''); }
function rmVariantRow(i) { S.editBuf.variants.splice(i,1); document.getElementById('var-list').innerHTML = S.editBuf.variants.map((v,j)=>variantRowHTML(v,j)).join(''); }
function addAddonRow() { S.editBuf.addons.push({name:'',price:0}); document.getElementById('addon-list').innerHTML = S.editBuf.addons.map((a,i)=>addonRowHTML(a,i)).join(''); }
function rmAddonRow(i) { S.editBuf.addons.splice(i,1); document.getElementById('addon-list').innerHTML = S.editBuf.addons.map((a,j)=>addonRowHTML(a,j)).join(''); }

function setFoodTypeToggle(btn) {
  btn.parentElement.querySelectorAll('.pay-btn').forEach(b => b.classList.toggle('active', b === btn));
  btn.closest('.form-grp').dataset.value = btn.dataset.v;
}

function saveItem(editId) {
  const n = document.getElementById('fi-n').value.trim();
  const c = document.getElementById('fi-c').value.trim();
  const p = parseFloat(document.getElementById('fi-p').value);
  const sRaw = document.getElementById('fi-s').value.trim();
  const stock = sRaw === '' ? null : Math.max(0, parseInt(sRaw) || 0);
  const code = document.getElementById('fi-code').value.trim();
  const kitchenId = document.getElementById('fi-kitchen').value || null;
  const foodType = document.getElementById('fi-foodtype').dataset.value;
  const active = document.getElementById('fi-active').checked;
  const reduceInventory = document.getElementById('fi-reduce-inv').checked;
  if (!n || !c || isNaN(p) || p < 0) { notify('Fill name, category & price'); return; }
  if (!/^\d{3}$/.test(code)) { notify(t('invalidCode')); return; }
  if (D.menu.some(i => i.code === code && i.id !== editId)) { notify(t('codeExists')); return; }
  const variants = S.editBuf.variants.filter(v => v.name.trim()).map(v => ({ name: v.name.trim(), delta: v.delta || 0 }));
  const addons = S.editBuf.addons.filter(a => a.name.trim()).map(a => ({ name: a.name.trim(), price: a.price || 0 }));
  if (editId) {
    const item = D.menu.find(i => i.id === editId);
    if (item) { item.name = n; item.category = c; item.price = p; item.stock = stock; item.variants = variants; item.addons = addons; item.code = code; item.kitchenId = kitchenId; item.foodType = foodType; item.active = active; item.reduceInventory = reduceInventory; }
  } else {
    D.menu.push({ id: uid(), name: n, category: c, price: p, stock, variants, addons, code, kitchenId, foodType, active, reduceInventory });
  }
  save(); closeModal(); rerenderMgmt();
  notify(editId ? 'Item updated' : 'Item added');
}

function delItem(itemId) {
  if (!confirm('Delete this item?')) return;
  D.menu = D.menu.filter(i => i.id !== itemId);
  save(); rerenderMgmt(); notify('Item deleted');
}

function toggleItemFlag(itemId, field, checked) {
  const item = D.menu.find(i => i.id === itemId);
  if (!item) return;
  item[field] = checked;
  save(); rerenderMgmt();
}

// Kitchen ids that any item of this order belongs to
function orderKitchenIds(o) {
  const ids = new Set();
  o.items.forEach(it => {
    const m = D.menu.find(x => x.id === it.id);
    if (m && m.kitchenId) ids.add(m.kitchenId);
  });
  return ids;
}

function toggleKotKitchenFilter(kitchenId, checked) {
  if (checked) { if (!S.kotKitchenFilter.includes(kitchenId)) S.kotKitchenFilter.push(kitchenId); }
  else S.kotKitchenFilter = S.kotKitchenFilter.filter(id => id !== kitchenId);
  rerenderKot();
}

function autoAcceptForKitchen(kitchenId) {
  const active = D.orders.filter(o =>
    (o.status === 'open' || o.status === 'paid') &&
    o.kotStatus === 'active' && o.kotPrepStatus !== 'done'
  );
  let changed = false;
  active.forEach(o => {
    o.items.forEach(item => {
      const m = D.menu.find(x => x.id === item.id);
      if (m && m.kitchenId === kitchenId) {
        const pending = item.qty - (item.acceptedQty || 0);
        if (pending > 0) { item.acceptedQty = item.qty; changed = true; }
      }
    });
    const allAccepted = o.items.every(i => i.qty <= (i.acceptedQty || 0));
    if (allAccepted && o.kotPrepStatus === 'pending') o.kotPrepStatus = 'preparing';
  });
  if (changed) save();
}

function toggleKotAutoAccept(kitchenId, checked) {
  if (checked) {
    if (!S.kotAutoAccept.includes(kitchenId)) S.kotAutoAccept.push(kitchenId);
    autoAcceptForKitchen(kitchenId);
  } else {
    S.kotAutoAccept = S.kotAutoAccept.filter(id => id !== kitchenId);
  }
  rerenderKot();
}

function rerenderKot() {
  // Auto-mark orders as done if their kitchens no longer require KOT
  let changed = false;
  D.orders.forEach(o => {
    if (o.kotStatus === 'active' && o.kotPrepStatus !== 'done' && !needsKOT(o)) {
      o.kotPrepStatus = 'done';
      o.items.forEach(i => { if ((i.acceptedQty||0) < i.qty) i.acceptedQty = i.qty; });
      changed = true;
    }
  });
  if (changed) save();
  if (S.kotAutoAccept && S.kotAutoAccept.length) S.kotAutoAccept.forEach(kid => autoAcceptForKitchen(kid));
  const v = document.querySelector('.view');
  if (v) v.innerHTML = kotHTML();
}

function clearAllKots() {
  const active = D.orders.filter(o =>
    (o.status === 'open' || o.status === 'paid') &&
    o.kotStatus === 'active' && o.kotPrepStatus !== 'done'
  );
  if (!active.length) { notify(t('noActiveKots')); return; }
  if (!confirm(`Mark all ${active.length} active KOT${active.length > 1 ? 's' : ''} as delivered?`)) return;
  active.forEach(o => {
    o.kotPrepStatus = 'done';
    o.tableChangeNote = null;
    o.items.forEach(i => { i.acceptedQty = i.qty; });
  });
  save();
  rerenderKot();
}

function cycleKotPrep(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  const cur = o.kotPrepStatus || 'pending';
  if (cur === 'pending') o.kotPrepStatus = 'preparing';
  else if (cur === 'preparing') { o.kotPrepStatus = 'done'; o.tableChangeNote = null; }
  else return;
  save(); rerenderKot();
}

function acceptKotCancellation(orderId, cancelId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  const c = (o.kotCancellations || []).find(x => x.id === cancelId);
  if (!c) return;
  c.accepted = true;
  c.acceptedAt = new Date().toISOString();
  save(); rerenderKot();
}

function applyKotItemRejection(o, item, rejectedAmount) {
  const before = calcBill(o).total;
  item.qty -= rejectedAmount;
  if (item.qty <= 0) o.items = o.items.filter(i => i !== item);
  const after = calcBill(o).total;
  const diff = Math.round((before - after) * 100) / 100;
  const extra = item.variant ? ` (${item.variant})` : '';
  if (o.status === 'paid') {
    if (!Array.isArray(o.refunds)) o.refunds = [];
    o.refunds.push({
      id: uid(), amount: diff,
      reason: `${rejectedAmount}× ${item.name}${extra} ${t('unavailableShort')}`,
      at: new Date().toISOString(), settled: false,
    });
  } else {
    if (!Array.isArray(o.billingNotices)) o.billingNotices = [];
    o.billingNotices.push({
      id: uid(),
      text: `${t('kitchen')}: ${item.name}${extra} ${t('reducedTo')} ${item.qty} (${rejectedAmount} ${t('unavailableShort')})`,
      at: new Date().toISOString(),
    });
  }
}

function confirmKotItem(orderId, lineId, acceptedAmount) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  const item = o.items.find(i => (i.lineId || i.id) === lineId);
  if (!item) return;
  const pendingQty = item.qty - (item.acceptedQty || 0);
  acceptedAmount = Math.max(0, Math.min(pendingQty, Math.floor(Number(acceptedAmount)) || 0));
  item.acceptedQty = (item.acceptedQty || 0) + acceptedAmount;
  const rejectedAmount = pendingQty - acceptedAmount;
  if (rejectedAmount > 0) applyKotItemRejection(o, item, rejectedAmount);
  if (o.kotPrepStatus === 'pending') o.kotPrepStatus = 'preparing';
  save(); rerenderKot();
}

function acceptAllPending(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  o.items.forEach(item => {
    const pendingQty = item.qty - (item.acceptedQty || 0);
    if (pendingQty > 0) item.acceptedQty = item.qty;
  });
  if (o.kotPrepStatus === 'pending') o.kotPrepStatus = 'preparing';
  save(); rerenderKot();
}

function settleRefund(orderId, refundId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  const r = (o.refunds || []).find(x => x.id === refundId);
  if (!r) return;
  r.settled = true;
  r.settledAt = new Date().toISOString();
  r.method = 'Cash';
  save();
  refreshOrderPane(o);
  notify(t('refundSettled'));
}

// Refund kept as a CRM "due to customer" balance instead of paid out now
function returnRefundLater(orderId, refundId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  const r = (o.refunds || []).find(x => x.id === refundId);
  if (!r || r.settled) return;
  const custName = ((o.customer && o.customer.name) || '').trim();
  const custPhone = normPhone((o.customer && o.customer.phone) || '');
  if (custName && custPhone) {
    confirmReturnRefundLater(orderId, refundId, custName, custPhone);
    return;
  }
  showModal(`
    <h3>${t('returnLater')}</h3>
    <p style="color:var(--muted);margin-bottom:14px;font-size:13px;">${t('refundDue')}: <strong style="font-size:16px;color:var(--text);">${fmt(r.amount)}</strong></p>
    <div class="form-grp"><label>${t('customerName')} *</label><input id="rl-name" type="text" value="${h(custName)}" placeholder="${t('customerName')}" autofocus></div>
    <div class="form-grp"><label>${t('mobileNumber')} *</label><input id="rl-phone" type="text" value="${h(custPhone || '+91 ')}" placeholder="+91 "></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary btn-lg" onclick="confirmReturnRefundLaterModal('${orderId}','${refundId}')">&#10003; ${t('save')}</button>
    </div>`);
  setTimeout(() => { const i = document.getElementById('rl-name'); if (i) { i.focus(); i.select(); } }, 60);
}

function confirmReturnRefundLaterModal(orderId, refundId) {
  const name = (document.getElementById('rl-name').value || '').trim();
  const phone = normPhone(document.getElementById('rl-phone').value || '');
  if (!name || !phone) { notify(t('enterCustDetails')); return; }
  closeModal();
  confirmReturnRefundLater(orderId, refundId, name, phone);
}

function confirmReturnRefundLater(orderId, refundId, name, phone) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  const r = (o.refunds || []).find(x => x.id === refundId);
  if (!r || r.settled) return;
  if (!o.customer) o.customer = { name, phone };
  else {
    if (!(o.customer.name || '').trim()) o.customer.name = name;
    if (!normPhone(o.customer.phone || '')) o.customer.phone = phone;
  }
  let c = findCustomerByPhone(phone);
  if (!c) {
    c = { id: uid(), name, phone, balance: 0, history: [] };
    D.customers.push(c);
  } else if (name && !(c.name || '').trim()) {
    c.name = name;
  }
  if (!Array.isArray(c.history)) c.history = [];
  const amt = Math.round((Number(r.amount) || 0) * 100) / 100;
  c.balance = Math.round(((Number(c.balance) || 0) - amt) * 100) / 100;
  c.history.push({
    date: new Date().toISOString(),
    orderId: o.id,
    billId: billId(o),
    items: [],
    amount: 0,
    dueAmount: -amt,
  });
  r.settled = true;
  r.settledAt = new Date().toISOString();
  r.method = 'Due';
  r.customerId = c.id;
  save();
  refreshOrderPane(o);
  notify(t('refundMarkedDue'));
  if (S.view === 'reports') rerenderReports();
}

function dismissBillingNotice(orderId, noticeId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  o.billingNotices = (o.billingNotices || []).filter(x => x.id !== noticeId);
  save();
  refreshOrderPane(o);
}

function kotHTML() {
  let active = D.orders.filter(o => (o.status === 'open' || o.status === 'paid') && o.kotStatus === 'active' && o.kotPrepStatus !== 'done');

    active = active.filter(o => {
      const ids = orderKitchenIds(o);
      return S.kotKitchenFilter.some(kid => ids.has(kid));
    });

    .sort((a, b) => new Date(b.kotDeletedAt || 0) - new Date(a.kotDeletedAt || 0));

  const activeCards = active.map(o => {
    const b = calcBill(o);
    const n = o.items.reduce((s, i) => s + i.qty, 0);
    const who = o.type === 'dine-in' ? (o.tableName || 'Table') : ((o.customer && o.customer.name) || t('counter'));
    const tm = new Date(o.kotSavedAt || o.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const isPaid = o.status === 'paid';
    const prep = o.kotPrepStatus || 'pending';
    const prepCls = prep === 'pending' ? 'kot-status-pending' : prep === 'preparing' ? 'kot-status-preparing' : '';
    const tcn = o.tableChangeNote;

    const cancelCls = cancellations.length ? 'has-cancellation' : '';
    return `<div class="kot-card ${prepCls} ${cancelCls}" onclick="cycleKotPrep('${o.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div>
          <span style="font-size:18px;font-weight:800;color:var(--primary);">#${o.serial != null ? pad4(o.serial) : '----'}</span>
          <div class="kot-id" style="font-size:10.5px;margin-top:1px;">${kotId(o)}</div>
        </div>
        <span class="kot-prep-badge ${prep}">${prep === 'pending' ? t('kotPending') : t('kotPreparing')}</span>
      </div>
      <div class="kot-who">${h(who)} <span style="color:var(--muted);font-weight:400;">&middot; ${tm}</span>${isPaid?` <span style="color:var(--success);font-weight:700;">&middot; ${t('paid')}</span>`:''}</div>
      ${tcn ? `<div class="kot-table-changed">&#8644; ${t('tableChangedFrom')} ${h(tcn.from)} ${t('to_')} ${h(tcn.to)}</div>` : ''}
      ${cancellations.map(c => {
        const extra = c.variant ? ` (${h(c.variant)})` : '';
        return `<div class="kot-cancel-note">
          <span>&#9888; ${t('itemCancelled')}: ${c.qty}\u00D7 ${h(c.name)}${extra}</span>
          <button class="btn btn-sm" style="background:#9333EA;color:#fff;" onclick="event.stopPropagation();acceptKotCancellation('${o.id}','${c.id}')">${t('accept')}</button>
        </div>`;
      }).join('')}
      ${(() => {
        const pendingItems = o.items.filter(i => (i.qty - (i.acceptedQty || 0)) > 0);
        if (!pendingItems.length) return '';
        return `<div class="kot-pending-review" onclick="event.stopPropagation()">
          <div style="display:flex;justify-content:space-between;align-items:center;margin:6px 0 4px;">
            <strong style="font-size:12px;color:var(--warning);">&#9203; ${t('pendingReview')}</strong>
            <button class="btn btn-sm" style="background:#16A34A;color:#fff;" onclick="acceptAllPending('${o.id}')">${t('acceptAll')}</button>
          </div>

            const extra = i.variant ? ` (${h(i.variant)})` : '';
            const pend = i.qty - (i.acceptedQty || 0);
            const inputId = `kot-qty-${o.id}-${key}`;
            return `<div class="kot-pending-row" style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
              <span style="flex:1;font-size:12.5px;">${pend}\u00D7 ${h(i.name)}${extra}</span>
              <input id="${inputId}" type="number" min="0" max="${pend}" value="${pend}" style="width:48px;padding:3px 4px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;">
              <button class="btn btn-sm" style="background:#16A34A;color:#fff;" onclick="confirmKotItem('${o.id}','${key}',document.getElementById('${inputId}').value)">${t('confirmQty')}</button>
              <button class="btn btn-sm" style="background:#FEE2E2;color:#DC2626;" onclick="confirmKotItem('${o.id}','${key}',0)">${t('na')}</button>
            </div>`;
          }).join('')}
        </div>`;
      })()}
      <div class="kot-items">${o.items.map(i => {
        const confirmed = (i.acceptedQty || 0) > 0 && (i.qty - (i.acceptedQty || 0)) <= 0;
        const status = confirmed ? ` <span style="font-size:10px;color:var(--success);font-weight:600;">(${t('kotPreparing').toLowerCase()})</span>` : '';
        return `${i.qty}\u00D7 ${h(i.name)}${status}`;
      }).join(', ')}</div>

        <span class="kot-amt">${fmt(b.total)} &middot; ${n} ${t('items')}</span>
        <span style="display:flex;gap:6px;" onclick="event.stopPropagation()">
          ${(!isPaid && canManage()) ? `<button class="btn btn-ghost btn-sm" onclick="go('order',{activeOrder:'${o.id}'})">${t('openOrder')}</button>` : ''}
        </span>
      </div>
    </div>`;
  }).join('');

  const deletedRows = deleted.map(o => {

        <span style="font-size:12.5px;background:#DC2626;color:#fff;padding:3px 10px;border-radius:12px;font-weight:700;">${t('deletedKots')}: ${deleted.length}</span>
      </span>
    </div>
    ${D.kitchens.length ? `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;">
      <div class="kot-kitchen-filter" style="margin-bottom:0;">

        </table>`
      : `<p style="color:var(--muted);font-size:13px;">${t('noDeletedKots')}</p>`}`;
}

function deleteKOT(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (o && (o.kotPrepStatus === 'preparing' || o.kotPrepStatus === 'done' || o.items.some(i => (i.acceptedQty || 0) > 0))) {
    notify(t('mustBillFirst'));
    return;
  }
  askPin(() => kotCommentModal(orderId));
}

function markKotServed(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  o.kotStatus = 'served';
  save(); renderMain();
}

function kotCommentModal(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  showModal(`
    <h3>${t('deleteKot')} ${kotId(o)}</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:12px;">${t('kotCommentPrompt')}</p>
    <div class="form-grp"><label>${t('reason')}</label><textarea id="kot-cmt" rows="3" autofocus></textarea></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-danger" onclick="applyDeleteKOT('${orderId}')">${t('apply')}</button>
    </div>`);
}

function applyDeleteKOT(orderId) {
  const o = D.orders.find(x => x.id === orderId);
  if (!o) return;
  const cmt = document.getElementById('kot-cmt').value.trim();
  if (!cmt) { notify(t('kotCommentPrompt')); return; }
  o.kotStatus = 'deleted';
  o.kotComment = cmt;
  o.kotDeletedAt = new Date().toISOString();
  o.status = 'cancelled';
  if (o.tableId) {
    const tbl = D.tables.find(x => x.id === o.tableId);
    if (tbl) { tbl.status = 'available'; tbl.orderId = null; }
    o.tableId = null;
  }
  if (S.activeOrder === orderId) S.activeOrder = null;
  save(); closeModal(); notify(t('deleted') + ' ' + kotId(o));
  if (S.view === 'order') go('tables'); else renderMain();
}

// ═══════════════════════════════════════════════════════
//  REPORTS
// ═══════════════════════════════════════════════════════
function reportsHTML() {
  const from = S.reportDateFrom || today();
  const to   = S.reportDateTo   || today();
  const td   = today();
  const rangeLabel = from === to ? from : from + ' to ' + to;
  const inRange = o => { const d = (o.closedAt||o.createdAt||'').slice(0,10); return d >= from && d <= to; };
  const billAmt = o => o.paidAmount != null ? o.paidAmount : calcBill(o).total;

  const rangeAll = D.orders.filter(o => o.status === 'paid' && inRange(o))
    .sort((a,b) => new Date(b.closedAt||b.createdAt) - new Date(a.closedAt||a.createdAt));
  const rangeOrd = rangeAll.filter(o => !o.deleted);

  const settlements = Array.isArray(D.dueSettlements) ? D.dueSettlements : [];
  const rSetts = settlements.filter(x => { const d=(x.date||'').slice(0,10); return d>=from && d<=to; });
  const rSettAmt = rSetts.reduce((s,x) => s+(Number(x.amount)||0), 0);

  const allRefunds = [];
  D.orders.forEach(o => (o.refunds||[]).forEach(r => { if (r.settled) allRefunds.push({...r, order:o}); }));
  const rRefunds = allRefunds.filter(r => { const d=(r.settledAt||'').slice(0,10); return d>=from && d<=to; });
  const rRefundAmt = rRefunds.reduce((s,r) => s+(Number(r.amount)||0), 0);
  const cashRefundAmt = rRefunds.filter(r => (r.method||'Cash')==='Cash').reduce((s,r) => s+(Number(r.amount)||0), 0);

  const mAmt = (o, method) => {
    if (o.splitPayments && o.splitPayments.length)
      return o.splitPayments.filter(p => p.method===method).reduce((s,p) => s+(Number(p.amount)||0), 0);
    return (o.paymentMethod||'Cash')===method ? billAmt(o) : 0;
  };

  const totalBilled  = rangeOrd.reduce((s,o) => s + billAmt(o), 0);
  const cashFromOrds = rangeOrd.reduce((s,o) => s + mAmt(o,'Cash'), 0);
  const cashAmt      = cashFromOrds + rSettAmt;
  const phonePeAmt   = rangeOrd.reduce((s,o) => s + mAmt(o,'PhonePe'), 0);
  const gpayAmt      = rangeOrd.reduce((s,o) => s + mAmt(o,'GPay'), 0);
  const paytmAmt     = rangeOrd.reduce((s,o) => s + mAmt(o,'Paytm'), 0);
  const bharatPeAmt  = rangeOrd.reduce((s,o) => s + mAmt(o,'BharatPe'), 0);
  const onlineAmt    = phonePeAmt + gpayAmt + paytmAmt + bharatPeAmt;
  const totalRev     = cashAmt + onlineAmt - cashRefundAmt;
  const custPLAmt    = D.orders.filter(o => inRange(o) && !o.deleted).reduce((s,o) => s+(Number(o.dueAmount)||0), 0);
  const restPLArr    = [];
  D.orders.forEach(o => { if (inRange(o)) (o.refunds||[]).forEach(r => { if (!r.settled && r.method==='Due') restPLArr.push(r); }); });
  const restPLAmt    = restPLArr.reduce((s,r) => s+(Number(r.amount)||0), 0);

  const activeInRange = D.orders.filter(o => { const d=(o.createdAt||'').slice(0,10); return d>=from && d<=to && o.kotStatus==='active' && o.status==='open'; });

  const pendingRefunds = [];
  D.orders.forEach(o => { if (o.status==='paid') (o.refunds||[]).forEach(r => { if (!r.settled) pendingRefunds.push({...r, order:o}); }); });

  const cashTxns = [];
  rangeAll.forEach(o => { const a=mAmt(o,'Cash'); if(a>0) cashTxns.push({type:'sale',order:o,amount:a,time:o.closedAt||o.createdAt}); });
  rRefunds.forEach(r => { if((r.method||'Cash')==='Cash') cashTxns.push({type:'refund',order:r.order,amount:-r.amount,time:r.settledAt,reason:r.reason}); });
  cashTxns.sort((a,b) => new Date(a.time)-new Date(b.time));
  const netCash = cashTxns.reduce((s,x) => s+x.amount, 0);

  const maxTo = (()=>{ const d=new Date(from); d.setDate(d.getDate()+90); const s=d.toISOString().slice(0,10); return s<td?s:td; })();

    <div class="stat-card">
      <div class="stat-lbl" style="display:flex;align-items:center;gap:5px;">${icon||''}${label}</div>
      <div class="stat-val" style="color:var(--success);">${fmt(val)}</div>
      ${sub?`<div class="stat-sub">${sub}</div>`:''}

    </div>

    </div>

    ${pendingRefunds.length > 0 ? `

        <tbody>

              <button class="btn btn-sm" style="background:#16A34A;color:#fff;" onclick="settleRefund('${r.order.id}','${r.id}');rerenderReports()">${t('settleCash')}</button>
              <button class="btn btn-sm" style="background:#fff;color:#92400E;border:1.5px solid #92400E;margin-left:4px;" onclick="returnRefundLater('${r.order.id}','${r.id}');rerenderReports()">${t('returnLater')}</button>

        </tbody>
      </table>

    <div class="card" style="margin-bottom:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <h3 style="font-size:15px;font-weight:600;">${t('order')} &mdash; ${rangeLabel}</h3>

      </div>
      ${(()=>{
        const PAGE = 20;
        const page = Math.max(0, Math.min(S.reportPage||0, Math.ceil(rangeAll.length/PAGE)-1));
        const totalPages = Math.ceil(rangeAll.length/PAGE) || 1;

        if (!rangeAll.length) return `<div class="empty"><div class="eico">&#128203;</div><p>${t('noOrders')}</p></div>`;

            <tbody>
              ${slice.map(o => {

        <h3 style="font-size:15px;font-weight:600;">${t('clearDue')} &mdash; ${rangeLabel}</h3>

          ${rSetts.map(s => {

              <td>${h(s.customerName||'')}</td>
              <td><span class="tag tag-paid">${h(s.method||'Cash')}</span></td>

}

function topItemsHTML(from, to) {
  const cnt = {};
  D.orders.filter(o => {
    if (o.status !== 'paid' || o.deleted) return false;
    if (!from || !to) return true;
    const d = (o.closedAt||o.createdAt||'').slice(0,10);
    return d >= from && d <= to;
  }).forEach(o =>
    o.items.forEach(i => {
      cnt[i.name] = cnt[i.name] || { qty:0, rev:0 };
      cnt[i.name].qty += i.qty;
      cnt[i.name].rev += (i.unitPrice||i.price||0) * i.qty;
    })
  );
  const sorted = Object.entries(cnt).sort((a,b) => b[1].qty - a[1].qty).slice(0,10);
  if (!sorted.length) return '<p style="color:var(--muted);font-size:13px;">No data yet</p>';
  const max = sorted[0][1].qty;
  return sorted.map(([nm, d]) => `
    <div class="bar-item">
      <div class="bar-row"><span>${h(nm)}</span><span style="color:var(--muted);">${d.qty} sold &middot; ${fmt(d.rev)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(d.qty/max*100).toFixed(1)}%"></div></div>
    </div>`).join('');
}

function rerenderReports() {
  const v = document.querySelector('.view');
  if (v) v.innerHTML = reportsHTML();
}

// ═══════════════════════════════════════════════════════
//  ACCOUNTS (EXPENDITURE / REVENUE)
// ═══════════════════════════════════════════════════════
// ── Cash & Online balances (used at the top of Accounts) ──
const ONLINE_APPS = ['PhonePe', 'GPay', 'Paytm', 'BharatPe'];

function billAmtFor(o) { return o.paidAmount != null ? o.paidAmount : calcBill(o).total; }

function cashAmountOf(o) {
  if (o.splitPayments && o.splitPayments.length) {
    return o.splitPayments.filter(p => p.method === 'Cash').reduce((s,p) => s + (Number(p.amount)||0), 0);
  }
  return (o.paymentMethod || 'Cash') === 'Cash' ? billAmtFor(o) : 0;
}

function onlineAmountOf(o, method) {
  if (o.splitPayments && o.splitPayments.length) {
    return o.splitPayments.filter(p => p.method !== 'Cash' && p.method !== 'Credit' && (!method || p.method === method))
      .reduce((s,p) => s + (Number(p.amount)||0), 0);
  }
  const m = o.paymentMethod || 'Cash';
  if (m === 'Cash' || m === 'Credit' || m === 'Pay Later') return 0;
  if (method && m !== method) return 0;
  return billAmtFor(o);
}

function expenseCashPortion(e) {
  const m = e.method || 'Cash';
  if (m === 'Cash' || m === 'Counter Cash') return Number(e.amount)||0;
  if (m === 'Split') return (Number(e.cash)||0) + (Number(e.counterCash)||0);
  return 0;
}

function expenseOnlinePortion(e) {
  const m = e.method || 'Cash';
  if (m === 'Online') return Number(e.amount)||0;
  if (m === 'Split') return Number(e.online)||0;
  return 0;
}

function computeCashOnlineBalances() {
  const td = today();
  const isToday = iso => (iso||'').slice(0,10) === td;
  const paid = D.orders.filter(o => o.status === 'paid' && !o.deleted);
  const settledRefunds = [];
  D.orders.forEach(o => (o.refunds||[]).forEach(r => { if (r.settled) settledRefunds.push(r); }));
  const settlements = Array.isArray(D.dueSettlements) ? D.dueSettlements : [];
  const expenses = D.expenses || [];

  const cashSales = paid.reduce((s,o) => s + cashAmountOf(o), 0);
  const cashRefunds = settledRefunds.filter(r => (r.method||'Cash') === 'Cash').reduce((s,r) => s + (Number(r.amount)||0), 0);
  const cashExpenses = expenses.reduce((s,e) => s + expenseCashPortion(e), 0);
  const cashSettlementsIn = settlements.filter(x => (x.method||'Cash') === 'Cash').reduce((s,x) => s + (Number(x.amount)||0), 0);
  const availableCash = Math.round((cashSales + cashSettlementsIn - cashRefunds - cashExpenses) * 100) / 100;

  const cashSalesToday = paid.filter(o => isToday(o.closedAt||o.createdAt)).reduce((s,o) => s + cashAmountOf(o), 0);
  const cashRefundsToday = settledRefunds.filter(r => (r.method||'Cash') === 'Cash' && isToday(r.settledAt)).reduce((s,r) => s + (Number(r.amount)||0), 0);
  const cashExpensesToday = expenses.filter(e => isToday(e.date)).reduce((s,e) => s + expenseCashPortion(e), 0);
  const cashSettlementsTodayIn = settlements.filter(x => (x.method||'Cash') === 'Cash' && isToday(x.date)).reduce((s,x) => s + (Number(x.amount)||0), 0);
  const cashInCounter = Math.round((cashSalesToday + cashSettlementsTodayIn - cashRefundsToday - cashExpensesToday) * 100) / 100;

  const onlineByApp = {};
  ONLINE_APPS.forEach(m => { onlineByApp[m] = paid.reduce((s,o) => s + onlineAmountOf(o, m), 0); });
  const onlineSales = paid.reduce((s,o) => s + onlineAmountOf(o, null), 0);
  const onlineExpenses = expenses.reduce((s,e) => s + expenseOnlinePortion(e), 0);
  const onlineSettlementsIn = settlements.filter(x => ONLINE_APPS.includes(x.method)).reduce((s,x) => s + (Number(x.amount)||0), 0);
  const availableOnline = Math.round((onlineSales + onlineSettlementsIn - onlineExpenses) * 100) / 100;

  return { cashInCounter, availableCash, availableOnline, onlineByApp };
}

function fmtSigned(n) {
  const v = Number(n) || 0;
  return v < 0 ? `−${fmt(-v)}` : fmt(v);
}

  return Math.round(((Number(vendor.openingDue)||0) + expDue) * 100) / 100;

function vendorCode(name) {
  return (name||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,12) || 'VENDOR';

function genBillId(vendor, dateIso) {
  const d = new Date(dateIso);
  const pad = n => String(n).padStart(2,'0');

function updSettleVendorDue(vendorId, el) {
  const v = D.vendors.find(x => x.id === vendorId);
  if (!v) return;
  const due = vendorTotalDue(v);
  let val = parseFloat(el.value);
  if (isNaN(val) || val < 0) val = 0;
  let others = 0;
  document.querySelectorAll('.sv-amt').forEach(i => { if (i !== el) others += parseFloat(i.value) || 0; });
  others = Math.round(others * 100) / 100;
  const maxAllowed = Math.max(0, Math.round((due - others) * 100) / 100);
  if (val > maxAllowed) { val = maxAllowed; el.value = val || ''; }
  el.classList.toggle('filled', val > 0);
  const rem = Math.round((due - others - val) * 100) / 100;
  const remEl = document.getElementById('sv-rem');
  if (remEl) {
    remEl.textContent = fmt(rem);
    remEl.style.color = rem === 0 ? 'var(--success)' : 'var(--warning)';
  }
}

function confirmSettleVendorDue(vendorId) {
  const v = D.vendors.find(x => x.id === vendorId);
  if (!v) return;
  const due = vendorTotalDue(v);
  if (due <= 0) return;
  let sum = 0;
  document.querySelectorAll('.sv-amt').forEach(i => { sum += Math.round((parseFloat(i.value) || 0) * 100) / 100; });
  sum = Math.round(sum * 100) / 100;
  if (sum <= 0) { notify(t('clearDueAmountReq')); return; }
  if (sum > due) sum = due;
  let remaining = sum;
  const od = Math.round((Number(v.openingDue)||0) * 100) / 100;
  const odReduce = Math.min(od, remaining);
  v.openingDue = Math.round((od - odReduce) * 100) / 100;
  remaining = Math.round((remaining - odReduce) * 100) / 100;
  const bills = (D.expenses||[]).filter(e => e.vendorId === vendorId && (Number(e.dueAmount)||0) > 0)
    .sort((a,b) => new Date(a.date) - new Date(b.date));
  for (const b of bills) {
    if (remaining <= 0) break;
    const bd = Math.round((Number(b.dueAmount)||0) * 100) / 100;
    const red = Math.min(bd, remaining);
    b.dueAmount = Math.round((bd - red) * 100) / 100;
    b.credit = b.dueAmount;
    remaining = Math.round((remaining - red) * 100) / 100;
  }
  save(); closeModal(); notify(t('settleDue') + ': ' + fmt(sum)); refreshExpenseView();
}

function revenueHTML() {
  if (!D.revenueCharges) D.revenueCharges = {};
  const paid = D.orders.filter(o => o.status === 'paid' && !o.deleted);
  const settledRefunds = [];
  D.orders.forEach(o => (o.refunds||[]).forEach(r => { if (r.settled) settledRefunds.push(r); }));

  const dates = new Set();
  paid.forEach(o => dates.add((o.closedAt||o.createdAt).slice(0,10)));
  settledRefunds.forEach(r => { if (r.settledAt) dates.add(r.settledAt.slice(0,10)); });
  Object.keys(D.revenueCharges).forEach(d => { if (Number(D.revenueCharges[d])) dates.add(d); });
  const sortedDates = [...dates].sort((a,b) => b.localeCompare(a));

  const rows = sortedDates.map(date => {
    const dayOrders = paid.filter(o => (o.closedAt||o.createdAt).slice(0,10) === date);
    const cash = dayOrders.reduce((s,o) => s + cashAmountOf(o), 0);
    const apps = {};
    ONLINE_APPS.forEach(m => { apps[m] = dayOrders.reduce((s,o) => s + onlineAmountOf(o, m), 0); });
    const onlineSum = ONLINE_APPS.reduce((s,m) => s + apps[m], 0);
    const charges = Number(D.revenueCharges[date]) || 0;
    const netOnline = Math.round((onlineSum - charges) * 100) / 100;
    const cashRefund = settledRefunds.filter(r => (r.method||'Cash') === 'Cash' && (r.settledAt||'').slice(0,10) === date)
      .reduce((s,r) => s + (Number(r.amount)||0), 0);
    const netCash = Math.round((cash - cashRefund) * 100) / 100;
    return { date, cash, apps, onlineSum, charges, netOnline, cashRefund, netCash };
  });

  const totals = rows.reduce((acc,r) => {
    acc.cash += r.cash;
    acc.onlineSum += r.onlineSum;
    acc.charges += r.charges;
    acc.netOnline += r.netOnline;
    acc.cashRefund += r.cashRefund;
    acc.netCash += r.netCash;
    ONLINE_APPS.forEach(m => { acc.apps[m] = (acc.apps[m]||0) + r.apps[m]; });
    return acc;
  }, { cash:0, onlineSum:0, charges:0, netOnline:0, cashRefund:0, netCash:0, apps:{} });

  if (rows.length === 0) {
    return `<div class="card"><div class="empty"><div class="eico">&#128202;</div><p>${t('noRevenueData')}</p></div></div>`;
  }

  return `
    <div class="card">
      <div style="overflow-x:auto;margin:0 -24px;padding:0 24px;">
        <table class="data-tbl" style="min-width:920px;">
          <thead><tr>
            <th>${t('date')}</th>
            <th style="text-align:right;">${t('payCash')}</th>
            ${ONLINE_APPS.map(m => `<th style="text-align:right;">${m}</th>`).join('')}
            <th style="text-align:right;">${t('charges')}</th>
            <th style="text-align:right;">${t('netOnline')}</th>
            <th style="text-align:right;">${t('cashRefund')}</th>
            <th style="text-align:right;">${t('netCash')}</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `<tr>
              <td style="white-space:nowrap;">${new Date(r.date).toLocaleDateString()}</td>
              <td style="text-align:right;">${fmt(r.cash)}</td>
              ${ONLINE_APPS.map(m => `<td style="text-align:right;">${fmt(r.apps[m]||0)}</td>`).join('')}
              <td style="text-align:right;">
                <input type="number" min="0" step="0.01" value="${r.charges || ''}" placeholder="0.00"
                  style="width:90px;text-align:right;padding:4px 6px;border:1.5px solid var(--border);border-radius:6px;font-size:12.5px;"
                  onchange="updRevenueCharge('${r.date}', this.value)">
              </td>
              <td style="text-align:right;font-weight:600;">${fmtSigned(r.netOnline)}</td>
              <td style="text-align:right;${r.cashRefund>0?'color:var(--danger);':''}">${r.cashRefund>0?'−'+fmt(r.cashRefund):fmt(0)}</td>
              <td style="text-align:right;font-weight:600;">${fmtSigned(r.netCash)}</td>
            </tr>`).join('')}
          </tbody>
          <tfoot>
            <tr style="font-weight:700;border-top:2px solid var(--border);">
              <td>${t('total')}</td>
              <td style="text-align:right;">${fmt(totals.cash)}</td>
              ${ONLINE_APPS.map(m => `<td style="text-align:right;">${fmt(totals.apps[m]||0)}</td>`).join('')}
              <td style="text-align:right;">${fmt(totals.charges)}</td>
              <td style="text-align:right;">${fmtSigned(totals.netOnline)}</td>
              <td style="text-align:right;${totals.cashRefund>0?'color:var(--danger);':''}">${totals.cashRefund>0?'−'+fmt(totals.cashRefund):fmt(0)}</td>
              <td style="text-align:right;">${fmtSigned(totals.netCash)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>`;
}

function updAddBillSplit() {

function addExpenseBill() {
  const dtRaw = document.getElementById('ab-dt').value;
  const amount = Math.round((parseFloat(document.getElementById('ab-amt').value) || 0) * 100) / 100;
  const vendorId = document.getElementById('ab-vendor').value;
  const vendor = D.vendors.find(v => v.id === vendorId);
  if (!vendor) { notify(t('vendorRequired')); return; }
  if (!amount || amount <= 0) { notify(t('amountInvalid')); return; }
  const method = S.billPayMethod || 'Cash';
  let cash = 0, online = 0, counterCash = 0, credit = 0;
  if (method === 'Cash') cash = amount;
  else if (method === 'Online') online = amount;
  else if (method === 'Counter Cash') counterCash = amount;
  else if (method === 'Credit') credit = amount;
  else if (method === 'Split') {
    cash = Math.round((parseFloat(document.getElementById('ab-cash').value) || 0) * 100) / 100;
    online = Math.round((parseFloat(document.getElementById('ab-online').value) || 0) * 100) / 100;
    counterCash = Math.round((parseFloat(document.getElementById('ab-countercash').value) || 0) * 100) / 100;
    credit = Math.round((parseFloat(document.getElementById('ab-credit').value) || 0) * 100) / 100;
    const sum = Math.round((cash + online + counterCash + credit) * 100) / 100;
    if (sum !== amount) { notify(t('splitMismatch')); return; }
  }
  const date = dtRaw ? new Date(dtRaw).toISOString() : new Date().toISOString();
  const comment = document.getElementById('ab-comment').value.trim();
  const fileInput = document.getElementById('ab-file');
  const file = fileInput && fileInput.files[0];

  const finish = (attachment) => {
    const billId = genBillId(vendor, date);
    D.expenses.push({
      id: uid(), billId, date, amount, vendorId, vendorName: vendor.name,
      method, cash, online, counterCash, credit, dueAmount: credit, comment, attachment,
    });
    save(); closeModal(); refreshExpenseView(); notify(t('save'));
  };

  if (file) {
    const reader = new FileReader();
    reader.onload = () => finish({ name: file.name, type: file.type, dataUrl: reader.result });
    reader.onerror = () => finish(null);
    reader.readAsDataURL(file);
  } else {
    finish(null);
  }
}

function updSettleExpense(expId, el) {
  const e = D.expenses.find(x => x.id === expId);
  if (!e) return;
  const due = Math.round((Number(e.dueAmount) || 0) * 100) / 100;
  let v = parseFloat(el.value);
  if (isNaN(v) || v < 0) v = 0;
  let others = 0;
  document.querySelectorAll('.se-amt').forEach(i => { if (i !== el) others += parseFloat(i.value) || 0; });
  others = Math.round(others * 100) / 100;
  const maxAllowed = Math.max(0, Math.round((due - others) * 100) / 100);
  if (v > maxAllowed) { v = maxAllowed; el.value = v || ''; }
  el.classList.toggle('filled', v > 0);
  const rem = Math.round((due - others - v) * 100) / 100;
  const remEl = document.getElementById('se-rem');
  if (remEl) {
    remEl.textContent = fmt(rem);
    remEl.style.color = rem === 0 ? 'var(--success)' : 'var(--warning)';
  }
}

function confirmSettleExpense(expId) {
  const e = D.expenses.find(x => x.id === expId);
  if (!e) return;
  const due = Math.round((Number(e.dueAmount) || 0) * 100) / 100;
  if (due <= 0) return;
  let sum = 0;
  document.querySelectorAll('.se-amt').forEach(i => { sum += Math.round((parseFloat(i.value) || 0) * 100) / 100; });
  sum = Math.round(sum * 100) / 100;
  if (sum <= 0) { notify(t('clearDueAmountReq')); return; }
  if (sum > due) sum = due;
  e.dueAmount = Math.round((due - sum) * 100) / 100;
  e.credit = e.dueAmount;
  save(); closeModal(); notify(t('settleDue') + ': ' + fmt(sum)); refreshExpenseView();
}

function billLabel(o) {
  if (o.serial != null) return billId(o);
  if (o.billNo != null) return String(o.billNo).padStart(4,'0');
  return '----';
}

function itLineSub(it) {
  const subs = [];
  if (it.variant) subs.push(it.variant);
  if (it.addons && it.addons.length) subs.push('+ ' + it.addons.map(a=>a.name).join(', '));
  if (it.note) subs.push('\u270E ' + it.note);
  return subs.length ? `<div class="line-sub">${h(subs.join(' \u00B7 '))}</div>` : '';
}

// ── PIN gate ──
function askPin(onOk) {
  S.pinCb = onOk;
  showModal(`
    <h3>${t('enterPin')}</h3>

      <input id="pin-in" type="password" inputmode="numeric" maxlength="4" placeholder="\u2022\u2022\u2022\u2022"

function requestDelete(orderId) { askPin(() => deleteReasonModal(orderId)); }
function deleteReasonModal(orderId) {
  const o = D.orders.find(x => x.id === orderId); if (!o) return;
  showModal(`
    <h3>${t('deleteBill')} #${billLabel(o)}</h3>

}
function applyDelete(orderId) {
  const o = D.orders.find(x => x.id === orderId); if (!o) return;

// ── Edit bill ──
function requestEdit(orderId) { askPin(() => editBillModal(orderId)); }
function editBillModal(orderId) {
  const o = D.orders.find(x => x.id === orderId); if (!o) return;
  editState = {
    orderId,
    items: o.items.map(i => ({ ...i, addons: (i.addons||[]).map(a => ({...a})) })),
    discount: o.discount || 0,
    discType: o.discType || '%',
    paymentMethod: o.paymentMethod || 'Cash',
    reason: '',
  };
  renderEditBillModal();
}
function renderEditBillModal() {
  const e = editState; if (!e) return;
  const o = D.orders.find(x => x.id === e.orderId);
  const b = calcBill({ items: e.items, discount: e.discount, discType: e.discType });
  const methods = ['Cash','PhonePe','GPay','Paytm','BharatPe'];
  showModal(`
    <h3>${t('editBill')} #${billLabel(o)}</h3>
    <div style="max-height:230px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:4px 10px;margin-bottom:12px;">
      ${e.items.length ? e.items.map((it,idx) => `
        <div class="order-row">
          <div style="flex:1;min-width:0;">
            <div class="or-name">${h(it.name)}</div>
            ${itLineSub(it)}
          </div>
          <div class="qty-ctrl">
            <button class="qbtn" onclick="editQty(${idx},-1)">&#8722;</button>
            <span class="qnum">${it.qty}</span>
            <button class="qbtn" onclick="editQty(${idx},1)">+</button>
          </div>
          <div class="or-price">${fmt(itemUnit(it)*it.qty)}</div>
        </div>`).join('') : `<p style="color:var(--muted);padding:12px 0;text-align:center;">No items</p>`}
    </div>
    <div class="disc-row" style="margin-bottom:12px;">
      <label>${t('discount')}:</label>
      <input type="number" value="${e.discount}" min="0" onchange="editState.discount=parseFloat(this.value)||0;renderEditBillModal()">
      <select onchange="editState.discType=this.value;renderEditBillModal()">
        <option value="%" ${e.discType==='%'?'selected':''}>%</option>
        <option value="flat" ${e.discType==='flat'?'selected':''}>Flat</option>
      </select>
    </div>
    <div class="form-grp">
      <label>${t('paymentMethod')}</label>
      <div class="pay-methods">
        ${methods.map(m => `<button class="pay-btn${e.paymentMethod===m?' active':''}" onclick="editState.paymentMethod='${m}';renderEditBillModal()">${m}</button>`).join('')}
      </div>
    </div>
    <div class="bill-row total" style="margin:6px 0 12px;"><span>${t('total')}</span><span>${fmt(b.total)}</span></div>
    <div class="form-grp"><label>${t('reason')} *</label><textarea id="ersn" rows="2" placeholder="${t('reason')}">${h(e.reason||'')}</textarea></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary" onclick="applyEdit()">${t('apply')}</button>
    </div>`);
}
function editQty(idx, d) {
  saveEditReason();
  const it = editState.items[idx]; if (!it) return;
  it.qty += d;
  if (it.qty <= 0) editState.items.splice(idx, 1);
  renderEditBillModal();
}
function saveEditReason() { const el = document.getElementById('ersn'); if (el) editState.reason = el.value; }
function applyEdit() {
  saveEditReason();
  const e = editState; if (!e) return;
  const o = D.orders.find(x => x.id === e.orderId); if (!o) return;
  const rsn = (e.reason || '').trim();
  if (!e.items.length) { notify('Bill cannot be empty'); return; }
  if (!rsn) { notify(t('reason') + '?'); return; }
  o.items = e.items;
  o.discount = e.discount;
  o.discType = e.discType;
  o.paymentMethod = e.paymentMethod;
  o.edited = true;
  o.editReason = rsn;
  o.editedAt = new Date().toISOString();
  save(); editState = null; closeModal(); rerenderReports(); notify(t('edited') + ' #' + billLabel(o));
}

function setKitchenFormToggle(btn) {
  btn.parentElement.querySelectorAll('.pay-btn').forEach(b => b.classList.toggle('active', b === btn));
  btn.closest('.form-grp').dataset.value = btn.dataset.v;
}

function toggleKitchenPrinterSize() {
  const printerGrp = document.getElementById('kt-printer');
  const sizeGrp = document.getElementById('kt-printer-size-grp');
  if (!printerGrp || !sizeGrp) return;
  sizeGrp.style.display = printerGrp.dataset.value === 'yes' ? '' : 'none';
}

// If KOT isn't required for a kitchen, its printer can't be on (no KOT to print) — disable the printer toggle
function syncKitchenPrinterAvailability() {
  const kotGrp = document.getElementById('kt-kot');
  const printerGrp = document.getElementById('kt-printer');
  const sizeGrp = document.getElementById('kt-printer-size-grp');
  const sizeSel = document.getElementById('kt-printer-size');
  if (!kotGrp || !printerGrp) return;
  const kotRequired = kotGrp.dataset.value !== 'no';
  const printerBtns = printerGrp.querySelectorAll('.pay-btn');
  printerBtns.forEach(b => b.disabled = !kotRequired);
  printerGrp.style.opacity = kotRequired ? '' : '0.5';
  if (!kotRequired) {
    printerGrp.dataset.value = 'no';
    printerBtns.forEach(b => b.classList.toggle('active', b.dataset.v === 'no'));
    if (sizeGrp) sizeGrp.style.display = 'none';
    if (sizeSel) sizeSel.disabled = true;
  } else if (sizeSel) {
    sizeSel.disabled = false;
  }
}

function addKitchen() {
  const name = document.getElementById('kt-n').value.trim();

  const kotRequired = document.getElementById('kt-kot').dataset.value !== 'no';
  const printerEnabled = document.getElementById('kt-printer').dataset.value === 'yes';
  const printerSize = document.getElementById('kt-printer-size').value;
  D.kitchens.push({ id: uid(), name, kotRequired, printerEnabled, printerSize });
  save(); closeModal(); rerenderSettings(); notify(t('kitchenSaved'));
}

        <option value="58mm"${k.printerSize==='58mm'?' selected':''}>58mm</option>
      </select>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary" onclick="saveKitchen('${kitchenId}')">${t('save')}</button>
    </div>`);
  syncKitchenPrinterAvailability();
}

function saveKitchen(kitchenId) {
  const k = D.kitchens.find(x => x.id === kitchenId);
  if (!k) return;
  const name = document.getElementById('kt-n').value.trim();
  if (!name) { notify(t('nameRequired')); return; }
  k.name = name;
  k.kotRequired = document.getElementById('kt-kot').dataset.value !== 'no';
  k.printerEnabled = document.getElementById('kt-printer').dataset.value === 'yes';
  k.printerSize = document.getElementById('kt-printer-size').value;
  save();
  // Auto-clear existing KOTs for kitchens that no longer require them
  let kotChanged = false;
  D.orders.forEach(o => {
    if (o.kotStatus === 'active' && o.kotPrepStatus !== 'done' && !needsKOT(o)) {
      o.kotPrepStatus = 'done';
      o.items.forEach(i => { if ((i.acceptedQty||0) < i.qty) i.acceptedQty = i.qty; });
      kotChanged = true;
    }
  });
  if (kotChanged) save();
  closeModal(); rerenderSettings(); notify(t('kitchenSaved'));
}

function deleteKitchen(kitchenId) {
  if (!confirm(t('deleteKitchenConfirm'))) return;
  D.kitchens = D.kitchens.filter(x => x.id !== kitchenId);
  save(); rerenderSettings();
}

function exportData() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(D,null,2)], {type:'application/json'}));
  a.download = `restobill-${today()}.json`;
  a.click(); notify('Data exported');
}

function importData(input) {
  const file = input.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const imp = JSON.parse(e.target.result);
      if (!imp.menu || !imp.tables || !imp.settings) throw new Error();
      if (!confirm('Replace all current data with this backup?')) return;
      D = imp;
      if (!D.settings.pin) D.settings.pin = '1234';
      if (!D.settings.outletCode) D.settings.outletCode = 'TYCC';
      if (!D.kotSeq || typeof D.kotSeq !== 'object') D.kotSeq = { day: null, next: 1 };
      if (!Array.isArray(D.users) || D.users.length === 0) D.users = [{ id:'u1', username:'Philip', password:'1234', role:'Owner' }];
      if (!Array.isArray(D.kitchens)) D.kitchens = [];
      if (!D.settings.billPrinter) D.settings.billPrinter = { enabled: true, size: '80mm' };
      if (D.billSeq == null) {
        const paidSorted = (D.orders||[]).filter(o => o.status === 'paid').sort((a,b) => new Date(a.closedAt||a.createdAt) - new Date(b.closedAt||b.createdAt));
        let n = 1; paidSorted.forEach(o => { if (o.billNo == null) o.billNo = n; n++; }); D.billSeq = n;
      }
      ensureMenuItemDefaults();
      save(); notify('Data imported'); go('tables');
    } catch { notify('Invalid backup file'); }
  };
  r.readAsText(file); input.value='';
}

// ── Menu CSV import/export ──
function csvField(v) {
  v = v == null ? '' : String(v);
  return /[",\r\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
}

function parseCsv(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') { if (text[i+1] === '"') { field += '"'; i++; } else inQuotes = false; }
      else field += c;
    } else if (c === '"') inQuotes = true;
    else if (c === ',') { row.push(field); field = ''; }
    else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
    else if (c === '\r') { /* skip */ }
    else field += c;
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function encodePairs(arr, valueKey) {
  return (arr || []).map(p => `${p.name}:${p[valueKey] || 0}`).join('|');
}

function decodePairs(str) {
  if (!str) return [];
  return String(str).split('|').map(s => s.trim()).filter(Boolean).map(s => {
    const idx = s.lastIndexOf(':');
    return idx < 0 ? { name: s, value: 0 } : { name: s.slice(0, idx).trim(), value: parseFloat(s.slice(idx+1)) || 0 };
  });
}

function exportMenuCsv() {
  const header = ['Code','Name','Category','Price','Stock','Kitchen','FoodType','Variants','Addons'];
  const rows = [header];
  D.menu.forEach(item => {
    const kitchen = D.kitchens.find(k => k.id === item.kitchenId);
    rows.push([
      item.code || '',
      item.name || '',
      item.category || '',
      item.price != null ? item.price : '',
      item.stock != null ? item.stock : '',
      kitchen ? kitchen.name : '',
      item.foodType || 'not-specified',
      encodePairs(item.variants, 'delta'),
      encodePairs(item.addons, 'price'),
    ]);
  });
  const csv = rows.map(r => r.map(csvField).join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = `restobill-menu-${today()}.csv`;
  a.click();
  notify(t('menuCsvExported'));
}

function importMenuCsv(input) {
  const file = input.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const rows = parseCsv(String(e.target.result)).filter(row => row.some(c => c.trim() !== ''));
      if (rows.length < 2) throw new Error();
      const header = rows[0].map(h => h.trim().toLowerCase());
      const ci = {
        code: header.indexOf('code'), name: header.indexOf('name'), category: header.indexOf('category'),
        price: header.indexOf('price'), stock: header.indexOf('stock'), kitchen: header.indexOf('kitchen'),
        foodType: header.indexOf('foodtype'), variants: header.indexOf('variants'), addons: header.indexOf('addons'),
      };
      if (ci.name < 0 || ci.category < 0 || ci.price < 0) throw new Error();
      if (!confirm(t('confirmImportMenuCsv'))) return;
      let added = 0, updated = 0;
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const name = (row[ci.name] || '').trim();
        const category = (row[ci.category] || '').trim();
        if (!name || !category) continue;
        const price = parseFloat(row[ci.price]) || 0;
        const stockRaw = ci.stock >= 0 ? (row[ci.stock] || '').trim() : '';
        const stock = stockRaw === '' ? null : Math.max(0, parseInt(stockRaw) || 0);
        const kitchenName = ci.kitchen >= 0 ? (row[ci.kitchen] || '').trim() : '';
        const kitchen = kitchenName ? D.kitchens.find(k => k.name.toLowerCase() === kitchenName.toLowerCase()) : null;
        const kitchenId = kitchen ? kitchen.id : null;
        const ftRaw = ci.foodType >= 0 ? (row[ci.foodType] || '').trim().toLowerCase() : '';
        const foodType = (ftRaw === 'veg' || ftRaw === 'non-veg') ? ftRaw : 'not-specified';
        const variants = decodePairs(ci.variants >= 0 ? row[ci.variants] : '').map(p => ({ name: p.name, delta: p.value }));
        const addons = decodePairs(ci.addons >= 0 ? row[ci.addons] : '').map(p => ({ name: p.name, price: p.value }));
        let code = ci.code >= 0 ? (row[ci.code] || '').trim() : '';

        const existing = /^\d{3}$/.test(code) ? D.menu.find(it => it.code === code) : null;
        if (existing) {
          existing.name = name; existing.category = category; existing.price = price; existing.stock = stock;
          existing.kitchenId = kitchenId; existing.foodType = foodType; existing.variants = variants; existing.addons = addons;
          updated++;
        } else {
          if (!/^\d{3}$/.test(code) || D.menu.some(it => it.code === code)) code = nextItemCode(null);
          D.menu.push({ id: uid(), name, category, price, stock, kitchenId, foodType, variants, addons, code });
          added++;
        }
      }
      ensureMenuItemDefaults();
      save(); rerenderMgmt();
      notify(t('menuCsvImported').replace('%s', added).replace('%s', updated));
    } catch { notify(t('invalidMenuCsv')); }
  };
  r.readAsText(file); input.value = '';
}

function resetAll() {
  if (!confirm('Delete ALL data and reset to defaults?')) return;
  if (!confirm('This cannot be undone. Are you sure?')) return;
  const keepTheme = D.settings.theme, keepLang = D.settings.lang, keepUsers = D.users, keepCode = D.settings.outletCode || 'TYCC';
  localStorage.removeItem('rb2_data');
  D = { settings:{name:'My Restaurant',taxRate:10,currency:'\u20B9',tableCount:10,theme:keepTheme,lang:keepLang,lowStock:5,pin:'1234',outletCode:keepCode,billPrinter:{enabled:true,size:'80mm'}}, menu:[], tables:[], orders:[], billSeq:1, kotSeq:{day:null,next:1}, users:keepUsers, kitchens:[] };
  initDefaults(true); buildNav(); notify('Reset complete'); go('tables');
}

function addCustomTable() {
